name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra all

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyrefly check

      - name: Format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # TODO: requires-python is >=3.12; consider adding a matrix strategy
          # to test on 3.13+ once we need to ensure broader compatibility.
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra all

      - name: Run unit tests
        run: uv run pytest tests/ -v
